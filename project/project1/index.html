<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick-Pick Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="quiz-container">
            <h1>Quick-Pick Quiz</h1>
            <div class="quiz-header">
                <div id="question">Loading question...</div>
                <div class="quiz-info">
                    <span id="question-number">Question 1/5</span>
                    <span id="score">Score: 0</span>
                </div>
            </div>
            
            <div class="options-container" id="options">
                <!-- Options will be inserted here by JavaScript -->
            </div>
            
            <div class="feedback" id="feedback"></div>
            
            <div class="controls">
                <button id="next-btn" class="btn" disabled>Next Question</button>
                <button id="restart-btn" class="btn restart-btn">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
