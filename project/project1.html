<!DOCTYPE html>
<html>
<head>
    <title>Typing Mood Detector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #ba4747;
            padding: 50px;
        }
        textarea {
            width: 300px;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Typing Mood Detector</h2>
    <textarea id="text" placeholder="type here"></textarea>
    <br>
    <button onclick="checkMood()">Check Mood</button>
    <div id="result"></div>
    <script>
        let start = Date.now();
        document.getElementById("text").addEventListener("focus", function () {
            start = Date.now();
        });
        function checkMood() {
            let text = document.getElementById("text").value;
            let end = Date.now();
            let timeTaken = (end - start) / 1000; // seconds
            let speed = text.length / timeTaken; // characters per second
            let mood = "";
            if (speed < 2) {
                mood = "Calm Human";
            } else if (speed < 5) {
                mood = "Fast Thinker";
            } else {
                mood = "Overheated Genius";
            }
            document.getElementById("result").innerHTML =
                "Typing Speed: " + speed.toFixed(2) + " chars/sec <br> Mood: " + mood;
        }
    </script>
</body>
</html>
