<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Master Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-glass: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #clock {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            background: -webkit-linear-gradient(#f8fafc, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #60a5fa;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.25);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        .output {
            background: rgba(0, 0, 0, 0.35);
            padding: 16px;
            border-radius: 12px;
            min-height: 50px;
            word-break: break-word;
            color: #34d399;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            border-left: 4px solid #34d399;
            line-height: 1.5;
            flex-grow: 1;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 16px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        ul::-webkit-scrollbar {
            width: 6px;
        }
        ul::-webkit-scrollbar-thumb {
            background-color: var(--card-border);
            border-radius: 10px;
        }

        li {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .remove-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
            width: auto;
            padding: 6px 10px;
            margin: 0;
            font-size: 0.85rem;
            border-radius: 6px;
            box-shadow: none;
        }

        .remove-btn:hover {
            background: #ef4444;
            color: white;
        }

        p {
            margin: 8px 0;
            color: var(--text-muted);
        }
        
        strong {
            color: var(--text-main);
        }
        
        .accent {
            color: #fcd34d;
        }

    </style>
</head>
<body>
    <div id="clock">Loading Time...</div>

    <div class="dashboard">
        <div class="card">
            <h2>User Profile</h2>
            <div id="profile-container" style="margin-bottom: 20px;"></div>
            <input type="text" id="nameInput" placeholder="Enter new name...">
            <button id="updateProfileBtn">Update Profile</button>
        </div>

        <div class="card">
            <h2>Tasks Manager</h2>
            <input type="text" id="taskInput" placeholder="Enter a task..." aria-label="Task input">
            <button id="addTaskBtn">Add Task</button>
            <ul id="taskList"></ul>
            <div class="output" id="arrayStats">Tasks: 0</div>
        </div>

        <div class="card">
            <h2>Math & Async Ops</h2>
            <input type="number" id="numInput" placeholder="Enter a base multiplier..." aria-label="Number input">
            <button id="calcBtn">Calculate Async (1.5s delay)</button>
            <div class="output" id="mathOutput">Awaiting calculation...</div>
        </div>

        <div class="card">
            <h2>API Promises Fetch</h2>
            <button id="fetchDataBtn">Fetch Random Joke</button>
            <div class="output" id="jokeOutput" style="border-left-color: #f472b6; color: #fdf2f8;">Click to fetch a joke via Promise API...</div>
        </div>
    </div>

    <script>
        let userProfile = {
            id: 1,
            name: "John Doe",
            role: "Developer",
            isPremium: true
        };

        const taskArray = ["Master JS Concepts", "Build a sick UI"];
        var globalAccessCounter = 0; 

        const clockElem = document.getElementById('clock');
        function updateTime() {
            const now = new Date(); 
            
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute:'2-digit', 
                second:'2-digit' 
            };
            
            clockElem.textContent = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000); 
        updateTime();

        function renderProfile() {
            const container = document.getElementById('profile-container');
            container.innerHTML = `
                <p><strong>Name:</strong> <span class="accent">${userProfile.name}</span></p>
                <p><strong>Length:</strong> <span class="accent">${userProfile.name.length} chars</span></p>
                <p><strong>Upper:</strong> <span class="accent">${userProfile.name.toUpperCase()}</span></p>
                <p><strong>Role:</strong> <span class="accent">${userProfile.role}</span></p>
                <p><strong>Premium:</strong> <span class="accent">${userProfile.isPremium ? 'Yes' : 'No'}</span></p>
            `;
        }
        renderProfile();

        document.getElementById('updateProfileBtn').addEventListener('click', () => {
            const nameInput = document.getElementById('nameInput').value.trim();
            if (nameInput !== "") { 
                userProfile.name = nameInput;
                renderProfile();
                document.getElementById('nameInput').value = "";
            }
        });

        const taskListElem = document.getElementById('taskList');
        const arrayStatsElem = document.getElementById('arrayStats');

        function renderTasks() {
            taskListElem.innerHTML = '';
            
            taskArray.forEach((task, index) => {
                const li = document.createElement('li'); 
                li.textContent = `${index + 1}. ${task}`;
                
                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'Remove';
                removeBtn.className = 'remove-btn';
                
                removeBtn.addEventListener('click', () => {
                    taskArray.splice(index, 1);
                    renderTasks();
                });

                li.appendChild(removeBtn);
                taskListElem.appendChild(li);
            });

            const totalTasks = taskArray.length;
            arrayStatsElem.innerHTML = `
                Total Tasks: <strong>${totalTasks}</strong><br>
                Is Empty: <strong>${totalTasks === 0 ? "True" : "False"}</strong>
            `;
        }
        renderTasks();

        document.getElementById('addTaskBtn').addEventListener('click', () => {
            const val = document.getElementById('taskInput').value.trim();
            if (val.length > 0) {
                taskArray.push(val);
                renderTasks();
                document.getElementById('taskInput').value = '';
            }
        });

        document.getElementById('calcBtn').addEventListener('click', () => {
            const numInput = document.getElementById('numInput').value;
            const output = document.getElementById('mathOutput');
            
            let numericVal = Number(numInput);

            if (isNaN(numericVal) || numInput === "") { 
                output.innerHTML = "<span style='color: #ef4444;'>Error: Please enter a valid number.</span>";
                return;
            }

            output.innerHTML = "<em>Processing async math operation...</em>";

            setTimeout(() => {
                const randomMultiplier = Number((Math.random() * 10).toFixed(2)); 
                const result = Math.round(numericVal * randomMultiplier);
                
                output.innerHTML = `
                    Input Base: <strong>${numericVal}</strong><br>
                    Random Multiplier: <strong>${randomMultiplier}</strong><br>
                    Final Rounded Result: <strong style='font-size: 1.2rem; color: #fff;'>${result}</strong>
                `;
            }, 1500);
        });

        document.getElementById('fetchDataBtn').addEventListener('click', async () => {
            const jokeOutput = document.getElementById('jokeOutput');
            jokeOutput.innerHTML = "<em>Establishing connection to API...</em>";

            try {
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                const { setup, punchline } = data;
                
                jokeOutput.innerHTML = `
                    <div style="margin-bottom: 8px;"><strong>Setup:</strong> ${setup}</div>
                    <div><strong>Punchline:</strong> ${punchline}</div>
                `;
            } catch (error) {
                jokeOutput.innerHTML = `<span style='color: #ef4444;'>Failed to fetch data: ${error.message}</span>`;
            }
        });

    </script>
</body>
</html>
